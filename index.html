body {

  justify-content: center;

canvas {

  image-rendering: pixelated;
}
#ui-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 10;
}
#death-msg {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-size: 28px;
  font-weight: bold;
  text-shadow: 0 0 20px #ff0000;
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
  text-align: center;
  white-space: nowrap;
}
#level-title {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  color: #aaa;
  font-size: 14px;
  pointer-events: none;
}
#death-count {
  position: absolute;
  top: 10px;
  right: 15px;
  color: #ff6666;
  font-size: 14px;
  pointer-events: none;
}
#touch-controls {
  display: none;
  position: absolute;
  bottom: 10px;
  left: 0; right: 0;
  justify-content: space-between;
  padding: 0 40px;
  pointer-events: all;
  z-index: 5;
}
.touch-btn {
  width: 60px; height: 60px;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 12px;
  color: #fff;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;

.touch-btn:active { background: rgba(255,255,255,0.25); }
#btn-jump { width: 100px; font-size: 20px; }

// 触屏控制
let touchLeft = false, touchRight = false, touchJump = false;
function setupTouch(id, onDown, onUp) {
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', e => { e.preventDefault(); onDown(true); });
  el.addEventListener('pointerup', e => { e.preventDefault(); onDown(false); });
  el.addEventListener('pointerleave', e => { e.preventDefault(); onDown(false); });
}
setupTouch('btn-left', v => touchLeft = v);
setupTouch('btn-right', v => touchRight = v);
setupTouch('btn-jump', v => touchJump = v);

// --- 粒子系统 ---
const particles = [];
function spawnParticles(x, y, count, color, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (Math.random() * 0.7 + 0.3) * speed;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 3,
      life: 1, decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 4, color
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles(ctx, camX, camY) {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - camX - p.size/2, p.y - camY - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// --- 振动效果 ---
let shakeAmount = 0;
function triggerShake(a) { shakeAmount = Math.max(shakeAmount, a); }

// --- 音频（简易 Web Audio 音效）---
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playBeep(freq, dur, type='square', vol=0.08) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function sfxJump() { playBeep(400, 0.1, 'square', 0.06); playBeep(600, 0.08, 'square', 0.04); }
function sfxDeath() { playBeep(80, 0.3, 'sawtooth', 0.12); playBeep(50, 0.4, 'sawtooth', 0.1); }
function sfxCoin() { playBeep(880, 0.06, 'square', 0.05); playBeep(1100, 0.08, 'square', 0.05); }
function sfxWin() { playBeep(523, 0.1, 'square', 0.07); playBeep(659, 0.1, 'square', 0.07); playBeep(784, 0.15, 'square', 0.08); }
function sfxCrumble() { playBeep(200, 0.15, 'sawtooth', 0.06); }

// --- 玩家 ---

  constructor(x, y) {

    this.onGround = false;

    this.invincible = 0; // 无敌帧
    this.alive = true;
    this.eyeBlink = 0;
  }
}

// --- 游戏状态 ---
const player = new Player(80, 380);
let currentLevel = 0;
let deathCount = 0;
let levelComplete = false;
let cameraX = 0, cameraY = 0;
let deathMsgTimer = 0;
let currentDeathMsg = '';
let deathFlash = 0;
let gameStarted = false;
let gameWin = false;

// 关卡运行时状态
let levelPlatforms = []; // {x,y,w,h,type, crumbleTimer, crumbled, fallen}
let levelTraps = [];     // {x,y,w,h,type, ...state}
let levelCoins = [];
let levelSigns = [];
let levelWidth = 800;
let levelHeight = 500;
let realExit = null;
let fakeExit = null;
let levelTotalNormalCoins = 0;

// 移动平台
let movingPlatforms = [];
// 坠落方块
let fallingBlocks = [];

const DEATH_MESSAGES = [
  '哈哈，上当了吧！', '陷阱！', '太天真了~', '别相信任何东西！',
  '再来一次？', '这是第几次了？', '你确定看清楚了吗？',
  '又被坑了！', '意想不到吧？', '你以为那是安全的？',
  '这个游戏没有怜悯', '继续尝试...', '习惯就好',
  '读读标志吧！', '技能不足啊~', '👻 惊喜！',
  '那不是出口！', '猜错了！', '哎呀...',
];

function initLevel(idx) {
  const lv = LEVELS[idx];
  levelWidth = lv.width;
  levelHeight = lv.height;
  levelPlatforms = lv.platforms.map(p => ({
    ...p, crumbleTimer: 0, crumbled: false, fallen: false, shakeX: 0,
    hidden: p.hidden || false, revealed: false, revealTimer: 0
  }));
  levelTraps = lv.traps.map(t => ({
    ...t,
    triggered: t.triggered !== undefined ? t.triggered : (t.type === 'teleport'),
    falling: false, fallY: t.y, originalY: t.y,
    revealed: t.hidden ? false : (t.revealed || false),
    hidden: t.hidden || false,
    revealTimer: 0
  }));
  levelCoins = lv.coins.map(c => ({...c}));
  levelTotalNormalCoins = levelCoins.filter(c => c.type === 'normal' || !c.type).length;
  levelSigns = lv.signs;
  realExit = lv.realExit;
  fakeExit = lv.fakeExit;
  player.startX = lv.playerStart.x;
  player.startY = lv.playerStart.y;
  player.reset();
  levelComplete = false;
  fallingBlocks = [];
  movingPlatforms = [];
  particles.length = 0;
}

// --- 碰撞检测 ---
function rectsCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h >= b.y;
}

// --- 游戏循环 ---
let lastTime = 0;
let elapsedTotal = 0;

function update(dt) {
  if (!gameStarted || levelComplete || gameWin) return;
  if (dt > 0.05) dt = 0.05; // 防止大帧跳跃

  // 振动衰减
  if (shakeAmount > 0) shakeAmount *= 0.85;
  if (shakeAmount < 0.1) shakeAmount = 0;

  // 死亡消息计时器
  if (deathMsgTimer > 0) {
    deathMsgTimer -= dt;
    if (deathMsgTimer <= 0) {
      document.getElementById('death-msg').style.opacity = '0';
    }
  }

  // 死亡闪屏衰减
  if (deathFlash > 0) {
    deathFlash -= dt * 2;
    if (deathFlash < 0) deathFlash = 0;
  }

  // 更新粒子
  updateParticles();

  const p = player;
  if (!p.alive) {
    // 重生计时
    p.invincible -= dt;
    if (p.invincible <= 0) {
      p.reset();
      initLevel(currentLevel);
      document.getElementById('death-msg').style.opacity = '0';
    }
    return;
  }

  // 无敌时间
  if (p.invincible > 0) p.invincible -= dt;

  // 输入
  let moveDir = 0;
  const leftPressed = keys['ArrowLeft'] || keys['KeyA'] || touchLeft;
  const rightPressed = keys['ArrowRight'] || keys['KeyD'] || touchRight;
  if (leftPressed) moveDir = -1;
  if (rightPressed) moveDir += 1;
  // 防止左右同时按
  if (Math.abs(moveDir) > 1) moveDir = 0;

  // 反向控制计时器（由陷阱金币触发）
  if (p.reverseTimer > 0) {
    p.reverseTimer -= dt;
    p.reversed = true;
    if (p.reverseTimer <= 0) {
      p.reversed = false;
    }
  } else {
    p.reversed = false;
  }

  if (p.reversed) moveDir = -moveDir;

  const jumpPressed = keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touchJump;

  const moveSpeed = 280;
  const jumpVel = -380;
  const gravity = 900;

  // 水平移动
  p.vx = moveDir * moveSpeed;
  if (moveDir !== 0) p.facingRight = moveDir > 0;

  // 重力
  p.vy += gravity * dt;
  const maxFall = 600;
  if (p.vy > maxFall) p.vy = maxFall;

  // 跳跃
  if (jumpPressed && p.onGround && !p.jumpHeld) {
    p.vy = jumpVel;
    p.onGround = false;
    p.jumpHeld = true;
    sfxJump();
  }
  if (!jumpPressed) p.jumpHeld = false;

  // 可可跳跃（跳跃时释放按键可减少上升高度）
  if (!jumpPressed && p.vy < -150) {
    p.vy *= 0.85;
  }

  // 更新位置
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  // 边界
  if (p.x - p.w/2 < 0) p.x = p.w/2;
  if (p.x + p.w/2 > levelWidth) p.x = levelWidth - p.w/2;

  // 掉落死亡
  if (p.y > levelHeight + 50) {
    killPlayer('掉下去了...');
    return;
  }

  // --- 隐身元素 revealTimer 递减 ---
  for (const plat of levelPlatforms) {
    if (plat.revealed && plat.revealTimer > 0 && !plat.crumbled) {
      plat.revealTimer -= dt;
      if (plat.revealTimer <= 0) plat.revealed = false;
    }
  }
  for (const trap of levelTraps) {
    if (trap.revealed && trap.revealTimer > 0) {
      trap.revealTimer -= dt;
      if (trap.revealTimer <= 0) trap.revealed = false;
    }
  }

  // --- 更新假平台 ---
  for (const plat of levelPlatforms) {
    if (plat.type === 'fake' && plat.crumbleTimer > 0 && !plat.crumbled) {
      plat.shakeX = (Math.random() - 0.5) * 4;
      plat.crumbleTimer -= dt;
      if (plat.crumbleTimer <= 0) {
        plat.crumbled = true;
        sfxCrumble();
        spawnParticles(plat.x + plat.w/2, plat.y + plat.h/2, 12, '#8b7355', 2);
      }
    }
  }

  // --- 更新坠落方块 ---
  for (const fb of fallingBlocks) {
    if (fb.falling) {
      fb.fallY += fb.fallSpeed * dt;
      fb.fallSpeed += 600 * dt;
      // 检查是否砸到玩家
      if (rectsCollide(
        {x:p.x-p.w/2, y:p.y-p.h, w:p.w, h:p.h},
        {x:fb.x, y:fb.fallY, w:fb.w, h:fb.h}
      )) {
        if (fb.hidden) { fb.revealed = true; fb.revealTimer = 3.0; }
        killPlayer('被砸扁了！');
        return;
      }
    }
  }

  // --- 触发坠落方块 ---
  for (const trap of levelTraps) {
    if (trap.type === 'falling_block' && !trap.triggered) {
      const triggerZone = {x:trap.triggerX, y:0, w:trap.triggerW, h:levelHeight};
      if (rectsCollide({x:p.x-p.w/2, y:p.y-p.h, w:p.w, h:p.h}, triggerZone)) {
        trap.triggered = true;
        trap.falling = true;
        trap.fallY = trap.originalY;
        trap.fallSpeed = 100;
        if (trap.hidden) { trap.revealed = true; trap.revealTimer = 3.0; }
        fallingBlocks.push(trap);
      }
    }
  }

  // --- 检查尖刺/陷阱碰撞 ---
  for (const trap of levelTraps) {
    if (trap.type === 'spike' || trap.type === 'hidden_spike') {
      // 隐藏尖刺（弹跳垫关联）：未揭示前不检测碰撞
      if (trap.hidden && !trap.revealed) continue;
      const tBox = {x:trap.x, y:trap.y, w:trap.w, h:trap.h};
      if (trap.type === 'hidden_spike' && !trap.revealed) {
        const dist = Math.abs(p.x - (trap.x + trap.w/2));
        if (dist < (trap.revealDist || 100)) {
          trap.revealed = true;
        } else {
          continue; // 还没揭露，不碰撞
        }
      }
      if (rectsCollide({x:p.x-p.w/2, y:p.y-p.h, w:p.w, h:p.h}, tBox)) {
        if (trap.hidden) { trap.revealed = true; trap.revealTimer = 3.0; }
        killPlayer('尖刺！');
        return;
      }
    }

    if (trap.type === 'kill_zone') {
      if (rectsCollide({x:p.x-p.w/2, y:p.y-p.h, w:p.w, h:p.h}, trap)) {
        killPlayer(trap.msg || '危险区域！');
        return;
      }
    }

    if (trap.type === 'teleport' && trap.triggered) {
      if (rectsCollide({x:p.x-p.w/2, y:p.y-p.h, w:p.w, h:p.h}, trap)) {
        if (trap.hidden) { trap.revealed = true; trap.revealTimer = 3.0; }
        p.x = trap.targetX;
        p.y = trap.targetY;
        p.vy = 0;
        spawnParticles(p.x, p.y, 15, '#ffff00', 3);
        playBeep(200, 0.3, 'sine', 0.08);
        trap.triggered = false; // 只触发一次
      }
    }

    if (trap.type === 'bounce') {
      if (rectsCollide({x:p.x-p.w/2, y:p.y-p.h, w:p.w, h:p.h}, trap) && p.vy >= 0) {
        p.vy = -(trap.power || 15) * 60;
        p.onGround = false;
        playBeep(500, 0.08, 'triangle', 0.06);
        // 揭示隐藏的弹跳垫和同组天花板尖刺
        if (trap.hidden && !trap.revealed) {
          trap.revealed = true;
          trap.revealTimer = 3.0;
          // 揭示同组的隐藏尖刺
          if (trap.group) {
            for (const t2 of levelTraps) {
              if (t2.hidden && t2.group === trap.group) {
                t2.revealed = true;
              }
            }
          }
          spawnParticles(p.x, p.y - 20, 8, '#ff6600', 3);
        }
      }
    }

    if (trap.type === 'fake_exit') {
      const exBox = {x:trap.x, y:trap.y, w:trap.w, h:trap.h};
      if (rectsCollide({x:p.x-p.w/2, y:p.y-p.h, w:p.w, h:p.h}, exBox)) {
        if (trap.hidden) { trap.revealed = true; trap.revealTimer = 3.0; }
        killPlayer(trap.msg || '假的出口！');
        return;
      }
    }
  }

  // --- 平台碰撞 ---
  p.onGround = false;
  const playerBox = {x:p.x-p.w/2, y:p.y-p.h, w:p.w, h:p.h};

  for (const plat of levelPlatforms) {
    if (plat.type === 'fake' && plat.crumbled) continue;
    if (plat.type === 'invisible_block') continue; // 由下方单独处理

    const sx = plat.x + (plat.shakeX||0);
    const platBox = {x:sx, y:plat.y, w:plat.w, h:plat.h};
    if (!rectsCollide(playerBox, platBox)) continue;

    const playerBottom = p.y;               // 玩家脚底
    const playerTop = p.y - p.h;            // 玩家头顶
    const prevBottom = p.y - p.vy * dt;     // 上一帧脚底（关键修复！）
    const prevTop = playerTop - p.vy * dt;  // 上一帧头顶
    const platTop = plat.y;
    const platBottom = plat.y + plat.h;

    // 1) 从上方落在平台上
    if (prevBottom <= platTop + 2 && p.vy >= 0) {
      p.y = plat.y;   // 脚底贴平台顶
      p.vy = 0;
      p.onGround = true;

      if (plat.type === 'fake' && plat.crumbleTimer <= 0) {
        plat.crumbleTimer = 0.2;
      }
      // 隐藏平台：踩到即揭示 3 秒
      if (plat.hidden && !plat.revealed) {
        plat.revealed = true;
        plat.revealTimer = 3.0;
        spawnParticles(p.x, p.y - p.h/2, 6, '#ffffff', 2);
      }
      if (plat.type === 'fake_wall') {
        continue; // 假墙：允许穿过但站上去不阻挡
      }
    }
    // 2) 从下方撞到天花板
    else if (p.vy < 0 && prevTop >= platBottom - 2 && playerTop <= platBottom) {
      p.y = platBottom + p.h;
      p.vy = 0;
    }
    // 3) 侧面碰撞（只对实心平台）
    else if (plat.type !== 'fake_wall') {
      const playerLeft = p.x - p.w/2;
      const playerRight = p.x + p.w/2;
      const platLeft = sx;
      const platRight = sx + plat.w;

      // 只在有足够垂直重叠时才做水平推挤
      if (playerBottom > platTop + 6 && playerTop < platBottom - 6) {
        if (p.vx > 0 && playerRight > platLeft && playerLeft < platLeft) {
          p.x = platLeft - p.w/2;
          p.vx = 0;
        } else if (p.vx < 0 && playerLeft < platRight && playerRight > platRight) {
          p.x = platRight + p.w/2;
          p.vx = 0;
        }
      }
    }
  }

  // 隐形实墙碰撞
  for (const plat of levelPlatforms) {
    if (plat.type !== 'invisible_block') continue;
    const platBox = {x:plat.x, y:plat.y, w:plat.w, h:plat.h};
    if (!rectsCollide(playerBox, platBox)) continue;
    // 全面碰撞——无法通过
    const pBottom = p.y;
    const pTop = p.y - p.h;
    const prevBottom2 = p.y - p.vy * dt;
    const prevTop2 = pTop - p.vy * dt;

    if (prevBottom2 <= plat.y + 2 && p.vy >= 0) {
      p.y = plat.y; p.vy = 0; p.onGround = true;
    } else if (p.vy < 0 && prevTop2 >= plat.y + plat.h - 2 && pTop <= plat.y + plat.h) {
      p.y = plat.y + plat.h + p.h; p.vy = 0;
    } else if (p.vx > 0) {
      p.x = plat.x - p.w/2; p.vx = 0;
    } else if (p.vx < 0) {
      p.x = plat.x + plat.w + p.w/2; p.vx = 0;
    }
  }

  // --- 硬币收集 / 陷阱金币 ---
  for (const coin of levelCoins) {
    // 更新尖刺状态
    if (coin.type === 'trap' && coin.spikeTriggered) {
      coin.spikeTimer += dt;
      if (coin.spikeTimer <= 0.30) {
        coin.spikeHeight = coin.spikeMaxH; // 瞬间升起+保持
      } else if (coin.spikeTimer <= 0.38) {
        coin.spikeHeight = coin.spikeMaxH * (1 - (coin.spikeTimer - 0.30) / 0.08); // 快速收回
      } else {
        coin.spikeHeight = 0;
        coin.spikeTriggered = false;
        coin.collected = true; // 尖刺消失后金币也消失
      }
      // 尖刺碰撞检测
      if (coin.spikeHeight > 10) {
        const spikeBox = {x:coin.x-5, y:coin.y-coin.spikeHeight, w:10, h:coin.spikeHeight};
        if (rectsCollide(playerBox, spikeBox)) {
          killPlayer('被尖刺刺穿了！');
          return;
        }
      }
      continue;
    }

    if (coin.collected) continue;
    const coinBox = {x:coin.x-8, y:coin.y-8, w:16, h:16};

    // 陷阱金币：玩家跳跃靠近时触发尖刺（虚晃跳机制）
    if (coin.type === 'trap' && !coin.spikeTriggered) {
      const distX = Math.abs(p.x - coin.x);
      if (distX < 55 && p.vy < -50) {
        // 玩家在金币附近跳起→触发尖刺！
        coin.spikeTriggered = true;
        coin.spikeTimer = 0;
        coin.spikeHeight = 0;
        playBeep(300, 0.15, 'sawtooth', 0.08);
        continue; // 本帧不收集，尖刺先触发
      }
    }

    // 碰触收集
    if (rectsCollide(playerBox, coinBox)) {
      coin.collected = true;
      if (coin.type === 'trap') {
        // 陷阱金币：触发反转效果 5 秒
        p.reverseTimer = 5.0;
        p.reversed = true;
        playBeep(200, 0.3, 'square', 0.08);
        spawnParticles(coin.x, coin.y, 10, '#ff00ff', 4);
      } else {
        sfxCoin();
        spawnParticles(coin.x, coin.y, 8, '#ffd700', 3);
      }
    }
  }

  // --- 检查真出口 ---
  if (realExit) {
    const exBox = {x:realExit.x, y:realExit.y, w:realExit.w, h:realExit.h};
    if (rectsCollide(playerBox, exBox)) {
      // 检查是否收集了所有真金币
      const collectedNormals = levelCoins.filter(c => (c.type === 'normal' || !c.type) && c.collected).length;
      const totalNormals = levelCoins.filter(c => c.type === 'normal' || !c.type).length;
      if (collectedNormals < totalNormals) {
        // 未收集完所有真金币 → 重新开始本关
        initLevel(currentLevel);
        deathCount++; // 不算死亡但计数提醒
        document.getElementById('death-msg').textContent = '💡 需要收集所有真金币！';
        document.getElementById('death-msg').style.opacity = '1';
        deathMsgTimer = 2.0;
        playBeep(150, 0.2, 'square', 0.06);
        playBeep(100, 0.3, 'square', 0.06);
        return;
      }
      if (currentLevel < LEVELS.length - 1) {
        // 下一关
        currentLevel++;
        initLevel(currentLevel);
        sfxWin();
        spawnParticles(realExit.x + realExit.w/2, realExit.y + realExit.h/2, 20, '#00ff00', 5);
      } else {
        // 通关！
        gameWin = true;
        levelComplete = true;
        sfxWin();
        spawnParticles(realExit.x + realExit.w/2, realExit.y + realExit.h/2, 40, '#ffd700', 6);
        document.getElementById('level-title').textContent = '🎉 恭喜通关！';
        document.getElementById('death-count').textContent = `总共死了 ${deathCount} 次`;
      }
    }
  }

  // --- 相机 ---
  const targetCX = p.x - W/2;
  const targetCY = p.y - H/2;
  cameraX += (targetCX - cameraX) * 8 * dt;
  cameraY += (targetCY - cameraY) * 8 * dt;
  if (cameraX < 0) cameraX = 0;
  if (cameraX > levelWidth - W) cameraX = levelWidth - W;
  if (cameraY < 0) cameraY = 0;
  if (cameraY > levelHeight - H) cameraY = levelHeight - H;
}

function killPlayer(msg) {
  const p = player;
  if (p.invincible > 0) return;
  p.alive = false;
  p.invincible = 0.8; // 0.8秒重生时间
  deathCount++;
  currentDeathMsg = msg || DEATH_MESSAGES[Math.floor(Math.random() * DEATH_MESSAGES.length)];
  deathMsgTimer = 1.2;
  triggerShake(8);
  // 死亡闪屏效果
  deathFlash = 0.6;
  sfxDeath();
  spawnParticles(p.x, p.y, 20, '#ff4444', 5);
  const deathEl = document.getElementById('death-msg');
  deathEl.textContent = currentDeathMsg;
  deathEl.style.opacity = '1';
  document.getElementById('death-count').textContent = `死亡: ${deathCount}`;
}

// --- 渲染 ---
function draw() {
  const lv = LEVELS[currentLevel];
  const shakeX = (Math.random() - 0.5) * shakeAmount;
  const shakeY = (Math.random() - 0.5) * shakeAmount;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // 背景
  ctx.fillStyle = lv.bgColor;
  ctx.fillRect(0, 0, W, H);

  // 背景网格
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  const gridSize = 40;
  const startGridX = -(cameraX % gridSize);
  const startGridY = -(cameraY % gridSize);
  for (let x = startGridX; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = startGridY; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // --- 平台 ---
  for (const plat of levelPlatforms) {
    if (plat.type === 'fake' && plat.crumbled) continue;
    // 隐藏平台：未揭示不渲染
    if (plat.hidden && !plat.revealed) continue;
    const sx = plat.x + (plat.shakeX||0) - cameraX;
    const sy = plat.y - cameraY;
    if (sx + plat.w < -10 || sx > W + 10 || sy + plat.h < -10 || sy > H + 10) continue;

    ctx.save();
    // 隐藏平台淡出效果
    if (plat.hidden && plat.revealed && plat.revealTimer < 0.5) {
      ctx.globalAlpha = Math.max(0.15, plat.revealTimer / 0.5);
    }
    if (plat.type === 'invisible_block') {
      // 隐形墙：完全看不到
      ctx.restore();
      continue;
    }

    // 假平台与正常平台外观完全一致，无法从颜色区分
    let fillColor, borderColor, topColor;
    if (plat.type === 'fake_wall') {
      fillColor = '#3a3a4a'; borderColor = '#4a4a5a'; topColor = '#5a5a6a';
      // 假墙——半透明
      ctx.globalAlpha = 0.3;
    } else {
      fillColor = '#2a3a4a'; borderColor = '#3a4a5a'; topColor = '#4a5a6a';
    }

    ctx.fillStyle = fillColor;
    ctx.fillRect(sx, sy, plat.w, plat.h);
    // 顶部高亮
    ctx.fillStyle = topColor;
    ctx.fillRect(sx, sy, plat.w, 3);
    // 边框
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy, plat.w, plat.h);

    ctx.restore();
  }

  // --- 尖刺 ---
  for (const trap of levelTraps) {
    // 隐藏陷阱：未揭示前不渲染
    if (trap.hidden && !trap.revealed) continue;
    if (trap.type === 'spike' || (trap.type === 'hidden_spike' && trap.revealed)) {
      ctx.save();
      if (trap.hidden && trap.revealed && trap.revealTimer < 0.5) {
        ctx.globalAlpha = Math.max(0.15, trap.revealTimer / 0.5);
      }
      const sx = trap.x - cameraX;
      const sy = trap.y - cameraY;
      if (sx + trap.w < -10 || sx > W + 10) continue;

      const spikeH = trap.h;
      const spikeW = trap.w;
      const spikeCount = Math.floor(spikeW / 12);
      ctx.fillStyle = '#ff3333';
      ctx.strokeStyle = '#ff6666';
      for (let i = 0; i < spikeCount; i++) {
        const cx = sx + i * (spikeW / spikeCount) + spikeW / spikeCount / 2;
        ctx.beginPath();
        ctx.moveTo(cx - 5, sy + spikeH);
        ctx.lineTo(cx, sy);
        ctx.lineTo(cx + 5, sy + spikeH);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }
      // 发光效果
      if (trap.type === 'hidden_spike') {
        ctx.fillStyle = 'rgba(255,0,0,0.2)';
        ctx.fillRect(sx - 2, sy - 2, trap.w + 4, trap.h + 4);
      }
      ctx.restore();
    }

    // 坠落方块
    if (trap.type === 'falling_block') {
      ctx.save();
      if (trap.hidden && trap.revealed && trap.revealTimer < 0.5) {
        ctx.globalAlpha = Math.max(0.15, trap.revealTimer / 0.5);
      }
      const sx = trap.x - cameraX;
      const sy = (trap.falling ? trap.fallY : trap.y) - cameraY;
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(sx, sy, trap.w, trap.h);
      ctx.strokeStyle = '#a0522d';
      ctx.strokeRect(sx, sy, trap.w, trap.h);
      // 裂缝纹理
      ctx.strokeStyle = '#654321';
      ctx.beginPath();
      ctx.moveTo(sx+2, sy+2); ctx.lineTo(sx+trap.w-4, sy+trap.h-4);
      ctx.moveTo(sx+trap.w/2, sy); ctx.lineTo(sx+trap.w/2, sy+trap.h);
      ctx.stroke();
      ctx.restore();
    }

    // 传送陷阱
    if (trap.type === 'teleport') {
      ctx.save();
      if (trap.hidden && trap.revealed && trap.revealTimer < 0.5) {
        ctx.globalAlpha = Math.max(0.15, trap.revealTimer / 0.5);
      }
      const sx = trap.x - cameraX;
      const sy = trap.y - cameraY;
      // 看起来像存档点——紫色旋涡
      const pulse = Math.sin(elapsedTotal * 3) * 0.3 + 0.7;
      ctx.fillStyle = `rgba(180,80,255,${pulse})`;
      ctx.beginPath();
      ctx.arc(sx + trap.w/2, sy + trap.h/2, trap.w/2 + 4, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#c0a0ff';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('💾', sx + trap.w/2, sy + trap.h/2 + 4);
      ctx.restore();
    }

    // 弹跳垫（隐藏时显示为金币，触发后显示弹簧）
    if (trap.type === 'bounce') {
      ctx.save();
      if (trap.hidden && trap.revealed && trap.revealTimer < 0.5) {
        ctx.globalAlpha = Math.max(0.15, trap.revealTimer / 0.5);
      }
      const sx = trap.x - cameraX;
      const sy = trap.y - cameraY;
      if (trap.hidden && !trap.revealed) {
        // 隐藏状态：伪装成金币
        const bob = Math.sin(elapsedTotal * 3 + trap.x) * 3;
        ctx.fillStyle = '#ffd700';
        ctx.strokeStyle = '#ffaa00';
        ctx.beginPath();
        ctx.arc(sx + trap.w/2, sy - 4 + bob, 7, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(sx + trap.w/2 - 2, sy - 6 + bob, 2, 0, Math.PI*2);
        ctx.fill();
      } else {
        // 触发后：显示弹簧
        ctx.fillStyle = '#ff6600';
        ctx.fillRect(sx, sy, trap.w, trap.h);
        ctx.fillStyle = '#ff9933';
        ctx.fillRect(sx, sy, trap.w, 4);
        ctx.strokeStyle = '#cc5500';
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
          const ly = sy + 6 + i * 5;
          ctx.beginPath();
          ctx.moveTo(sx+2, ly); ctx.lineTo(sx+trap.w/2, ly-2); ctx.lineTo(sx+trap.w-2, ly);
          ctx.stroke();
        }
      }
    }

    // 反向控制区已移除，改为陷阱金币触发

    // 假出口
    if (trap.type === 'fake_exit') {
      ctx.save();
      if (trap.hidden && trap.revealed && trap.revealTimer < 0.5) {
        ctx.globalAlpha = Math.max(0.15, trap.revealTimer / 0.5);
      }
      const sx = trap.x - cameraX;
      const sy = trap.y - cameraY;
      const glow = Math.sin(elapsedTotal * 4) * 0.3 + 0.7;
      ctx.fillStyle = `rgba(0,255,100,${glow})`;
      ctx.fillRect(sx, sy, trap.w, trap.h);
      ctx.strokeStyle = '#00ff66';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx, sy, trap.w, trap.h);
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('EXIT', sx + trap.w/2, sy + trap.h/2 + 3);
      ctx.restore();
    }
  }

  // --- 硬币（陷阱金币与普通金币外观完全一致）---
  for (const coin of levelCoins) {
    if (coin.collected && !(coin.type === 'trap' && coin.spikeTriggered)) continue;
    const sx = coin.x - cameraX;
    const sy = coin.y - cameraY;

    // 陷阱金币尖刺渲染
    if (coin.type === 'trap' && coin.spikeTriggered && coin.spikeHeight > 2) {
      const spikeH = coin.spikeHeight;
      // 尖刺主体
      ctx.fillStyle = '#ff2222';
      ctx.fillRect(sx-4, sy-spikeH, 8, spikeH);
      // 尖刺顶部（三角形）
      ctx.fillStyle = '#ff0000';
      ctx.beginPath();
      ctx.moveTo(sx-7, sy-spikeH+8);
      ctx.lineTo(sx, sy-spikeH-4);
      ctx.lineTo(sx+7, sy-spikeH+8);
      ctx.closePath();
      ctx.fill();
      // 发光
      ctx.fillStyle = 'rgba(255,0,0,0.3)';
      ctx.fillRect(sx-8, sy-spikeH-4, 16, spikeH+4);
    }

    // 未收集的金币（或尖刺收回后的残留闪烁）
    if (!coin.collected || (coin.type === 'trap' && coin.spikeTriggered && coin.spikeHeight < 5)) {
      const bob = Math.sin(elapsedTotal * 3 + coin.x) * 3;
      ctx.fillStyle = '#ffd700';
      ctx.strokeStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(sx, sy + bob, 7, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
      // 闪光
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(sx-2, sy+bob-2, 2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // --- 标志 ---
  for (const sign of levelSigns) {
    const sx = sign.x - cameraX;
    const sy = sign.y - cameraY;
    if (sx < -100 || sx > W + 100) continue;
    // 标牌
    ctx.fillStyle = '#8b6914';
    ctx.fillRect(sx-2, sy-16, 4, 20);
    ctx.fillStyle = sign.lying ? '#5c3a0a' : '#6b4a1a';
    ctx.fillRect(sx-40, sy-24, 80, 16);
    ctx.strokeStyle = '#8b6914';
    ctx.strokeRect(sx-40, sy-24, 80, 16);
    ctx.fillStyle = sign.lying ? '#ffcc88' : '#ffffff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(sign.text, sx, sy-14);
  }

  // --- 真出口 ---
  if (realExit) {
    const sx = realExit.x - cameraX;
    const sy = realExit.y - cameraY;
    const glow = Math.sin(elapsedTotal * 3) * 0.3 + 0.7;
    // 光晕
    const grad = ctx.createRadialGradient(sx+realExit.w/2, sy+realExit.h/2, 0, sx+realExit.w/2, sy+realExit.h/2, 30);
    grad.addColorStop(0, `rgba(0,255,100,${glow*0.6})`);
    grad.addColorStop(1, 'rgba(0,255,100,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(sx-20, sy-20, realExit.w+40, realExit.h+40);

    ctx.fillStyle = '#00ff66';
    ctx.fillRect(sx, sy, realExit.w, realExit.h);
    ctx.strokeStyle = '#00cc44';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, realExit.w, realExit.h);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('🚪', sx + realExit.w/2, sy + realExit.h/2 + 4);
  }

  // --- 玩家 ---
  const p = player;
  if (p.alive && p.invincible <= 0) {
    const px = p.x - cameraX - p.w/2;
    const py = p.y - cameraY - p.h;
    const blink = Math.sin(elapsedTotal * 4) > 0;

    // 身体
    ctx.fillStyle = p.reversed ? '#ff66ff' : '#4488ff';
    ctx.fillRect(px + 2, py + 4, p.w - 4, p.h - 8);
    // 头
    ctx.fillStyle = p.reversed ? '#ff88ff' : '#66aaff';
    ctx.fillRect(px + 4, py, p.w - 8, 12);
    // 眼睛
    const eyeY = py + 4;
    if (blink) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(px + 7, eyeY, 5, 5);
      ctx.fillRect(px + p.w - 12, eyeY, 5, 5);
      ctx.fillStyle = '#000';
      ctx.fillRect(px + p.facingRight ? 10 : 8, eyeY + 1, 2, 2);
      ctx.fillRect(px + p.facingRight ? p.w - 9 : p.w - 11, eyeY + 1, 2, 2);
    } else {
      ctx.fillStyle = '#000';
      ctx.fillRect(px + 8, eyeY + 1, 4, 1);
      ctx.fillRect(px + p.w - 12, eyeY + 1, 4, 1);
    }
    // 腿
    ctx.fillStyle = '#3355aa';
    ctx.fillRect(px + 4, py + p.h - 8, 7, 6);
    ctx.fillRect(px + p.w - 11, py + p.h - 8, 7, 6);

    // 反转指示器
    if (p.reversed) {
      ctx.fillStyle = 'rgba(255,0,255,0.8)';
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('↔', px + p.w/2, py - 6);
    }
  } else if (!p.alive) {
    // 死亡动画——淡化
    const alpha = p.invincible / 0.8;
    ctx.globalAlpha = alpha;
    const px = p.x - cameraX - p.w/2;
    const py = p.y - cameraY - p.h;
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(px, py, p.w, p.h);
    ctx.globalAlpha = 1;
  }

  // --- 粒子 ---
  drawParticles(ctx, cameraX, cameraY);

  // 死亡闪屏
  if (deathFlash > 0) {
    ctx.fillStyle = `rgba(255,0,0,${deathFlash * 0.3})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();
}

function drawUI() {
  // 关卡标题
  document.getElementById('level-title').textContent = LEVELS[currentLevel].name;
  document.getElementById('death-count').textContent = `死亡: ${deathCount}`;

  // 如果没有开始
  if (!gameStarted) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('陷阱闯关', W/2, H/2 - 60);
    ctx.font = '16px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('别相信任何东西...', W/2, H/2 - 20);
    ctx.fillText('包括这句话', W/2, H/2);
    ctx.fillStyle = '#00ff66';
    ctx.font = '20px monospace';
    const blink2 = Math.sin(elapsedTotal * 2) > 0;
    if (blink2) ctx.fillText('按任意键开始', W/2, H/2 + 60);
    ctx.font = '12px monospace';
    ctx.fillStyle = '#666';
    ctx.fillText('← → 移动 | ↑/空格 跳跃', W/2, H/2 + 100);
  }

  if (gameWin) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 40px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('🎉 恭喜通关！', W/2, H/2 - 40);
    ctx.fillStyle = '#fff';
    ctx.font = '18px monospace';
    ctx.fillText(`总死亡次数: ${deathCount}`, W/2, H/2 + 10);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px monospace';
    ctx.fillText('你经历了无数陷阱的考验！', W/2, H/2 + 40);
    ctx.fillText('按 R 重新开始', W/2, H/2 + 70);
  }
}

function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let dt = (timestamp - lastTime) / 1000;
  if (dt > 0.1) dt = 0.016; // 防止后台恢复时大跳跃
  lastTime = timestamp;
  elapsedTotal += dt;

  if (gameStarted && !gameWin) {
    update(dt);
  }

  draw();
  drawUI();

  requestAnimationFrame(gameLoop);
}

// --- 初始化 ---
function startGame() {
  initAudio();
  gameStarted = true;
  currentLevel = 0;
  deathCount = 0;
  gameWin = false;
  initLevel(0);
  document.getElementById('death-msg').style.opacity = '0';
}

// 点击或按键开始
canvas.addEventListener('click', () => { if (!gameStarted) startGame(); });
window.addEventListener('keydown', (e) => {
  if (!gameStarted) { startGame(); return; }
  if (gameWin && e.key === 'r') {
    gameWin = false;
    currentLevel = 0;
    deathCount = 0;
    initLevel(0);
    document.getElementById('death-count').textContent = '死亡: 0';
  }
});

// 触屏点击开始
document.getElementById('ui-overlay').addEventListener('click', (e) => {
  if (!gameStarted) startGame();
});

// 启动游戏循环
initLevel(0);
requestAnimationFrame(gameLoop);
</script>
</body>
